<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho | Athletica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#005cab; --bg:#f5faff; --text:#171c20; --muted:#5c6372; --card:#fff; --border:#e2e8f0; --danger:#ba1a1a; }
        * { box-sizing:border-box; } body { margin:0; font-family:Inter,sans-serif; background:var(--bg); color:var(--text); }
        header { height:64px; background:#fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2; }
        .bar, main { max-width:1180px; margin:auto; padding:0 24px; }
        .bar { height:64px; display:flex; justify-content:space-between; align-items:center; }
        .logo { color:var(--primary); font-weight:800; font-size:22px; display:flex; gap:10px; align-items:center; }
        .actions { display:flex; gap:10px; align-items:center; }
        nav { display:flex; gap:16px; } a { color:inherit; text-decoration:none; } nav a { color:var(--muted); font-weight:600; }
        h1 { font-size:44px; margin:38px 0 24px; letter-spacing:0; }
        .layout { display:grid; grid-template-columns:1fr 340px; gap:24px; align-items:start; }
        .item, .summary { background:#fff; border:1px solid var(--border); border-radius:8px; }
        .item { display:grid; grid-template-columns:150px 1fr auto; gap:16px; padding:14px; margin-bottom:14px; }
        .item img { width:150px; height:110px; object-fit:cover; border-radius:8px; }
        .summary { padding:18px; position:sticky; top:86px; }
        .row { display:flex; justify-content:space-between; margin:12px 0; color:var(--muted); }
        .total { font-size:26px; color:var(--primary); font-weight:800; }
        button { border:0; border-radius:8px; padding:12px 16px; font-weight:800; cursor:pointer; }
        .btn { background:var(--primary); color:white; width:100%; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn.secondary { background:#e9eef3; color:var(--text); width:auto; padding:8px 14px; font-size:14px; }
        .btn:hover { opacity:.9; }
        .user-badge { display:flex; align-items:center; gap:8px; background:#e9eef3; border-radius:8px; padding:8px 14px; font-weight:600; font-size:14px; color:var(--text); }
        .remove { color:var(--danger); background:#fff; }
        .empty { background:#fff; border:1px dashed var(--border); border-radius:8px; padding:28px; color:var(--muted); }
        @media(max-width:800px){ .layout, .item { grid-template-columns:1fr; } nav { display:none; } .item img { width:100%; height:220px; } }
    </style>
</head>
<body>
<header>
    <div class="bar">
        <a class="logo" href="/Home"><span class="material-symbols-outlined">camera</span>Athletica</a>
        <nav><a href="/eventos">Eventos</a><a href="/fotos">Fotos</a><a href="/carrinho">Carrinho</a><a href="/minhas-fotos">Minhas fotos</a></nav>
        <div class="actions">
            <span th:if="${usuario != null}" class="user-badge">
                <span class="material-symbols-outlined" style="font-size:18px">person</span>
                <span th:text="'Olá, ' + ${usuario.nome}">Olá</span>
            </span>
            <button th:if="${usuario != null}" class="btn secondary" onclick="fazerLogout()">Sair</button>
        </div>
    </div>
</header>
<main>
    <h1>Seu carrinho</h1>
    <div class="layout">
        <section id="items"></section>
        <aside class="summary">
            <h2>Resumo</h2>
            <div class="row"><span>Subtotal</span><strong id="subtotal">R$ 0.00</strong></div>
            <div class="row"><span>Desconto automático</span><span>3 fotos: 5% | 6 fotos: 10%</span></div>
            <hr>
            <div class="row"><span>Total estimado</span><span class="total" id="total">R$ 0.00</span></div>
            <button class="btn" id="checkout"><span class="material-symbols-outlined">lock</span>Finalizar pedido</button>
            <p id="message"></p>
        </aside>
    </div>
</main>
<script>
    let carrinho = { itens: [], total: 0 };

    function moeda(valor) {
        return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    async function carregarCarrinho() {
        const response = await fetch('/api/carrinho', { credentials: 'include' });
        if (response.status === 401) {
            window.location.href = '/login';
            return;
        }
        carrinho = await response.json();
        renderizar();
    }

    function renderizar() {
        const items = document.getElementById('items');
        if (carrinho.itens.length === 0) {
            items.innerHTML = '<div class="empty">Seu carrinho está vazio. Abra a galeria e escolha algumas fotos.</div>';
        } else {
            items.innerHTML = carrinho.itens.map(item =>
                '<article class="item">' +
                    '<img src="' + item.urlMarcaDagua + '" alt="' + item.nomeFoto + '">' +
                    '<div>' +
                        '<h2>' + item.nomeFoto + '</h2>' +
                        '<strong>' + moeda(item.preco) + '</strong>' +
                    '</div>' +
                    '<button class="remove" onclick="remover(' + item.fotoId + ')">' +
                        '<span class="material-symbols-outlined">delete</span>' +
                    '</button>' +
                '</article>'
            ).join('');
        }

        document.getElementById('subtotal').textContent = moeda(carrinho.total);
        document.getElementById('total').textContent = moeda(calcularTotalComDesconto());
    }

    function calcularTotalComDesconto() {
        const total = Number(carrinho.total);
        if (carrinho.itens.length >= 6) return total * 0.90;
        if (carrinho.itens.length >= 3) return total * 0.95;
        return total;
    }

    async function remover(fotoId) {
        await fetch('/api/carrinho/' + fotoId, { method: 'DELETE', credentials: 'include' });
        carregarCarrinho();
    }

    document.getElementById('checkout').addEventListener('click', async () => {
        const message = document.getElementById('message');
        if (carrinho.itens.length === 0) {
            message.textContent = 'Adicione fotos antes de finalizar.';
            return;
        }
        const response = await fetch('/api/pedidos', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fotosIds: carrinho.itens.map(item => item.fotoId) })
        });
        if (response.ok) {
            message.textContent = 'Pedido criado com sucesso.';
            window.location.href = '/minhas-fotos';
        } else {
            message.textContent = 'Não foi possível finalizar o pedido.';
        }
    });

    carregarCarrinho();
</script>
<script>
    async function fazerLogout() {
        await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/login';
    }
</script>
</body>
</html>
