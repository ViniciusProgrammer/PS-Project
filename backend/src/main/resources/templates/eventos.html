<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Athletica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#005cab; --bg:#f5faff; --text:#171c20; --muted:#5c6372; --card:#fff; --border:#e2e8f0; }
        * { box-sizing:border-box; } body { margin:0; font-family:Inter,sans-serif; background:var(--bg); color:var(--text); }
        header { height:64px; background:#fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2; }
        .bar, main { max-width:1180px; margin:auto; padding:0 24px; }
        .bar { height:64px; display:flex; justify-content:space-between; align-items:center; }
        .logo { color:var(--primary); font-weight:800; font-size:22px; display:flex; gap:10px; align-items:center; }
        .actions { display:flex; gap:10px; align-items:center; }
        nav { display:flex; gap:16px; } a { color:inherit; text-decoration:none; } nav a { color:var(--muted); font-weight:600; }
        h1 { font-size:44px; margin:38px 0 10px; letter-spacing:0; } p { color:var(--muted); }
        form { display:grid; grid-template-columns:1fr 220px auto; gap:12px; margin:28px 0; }
        input, select { border:1px solid var(--border); border-radius:8px; padding:12px; font:inherit; background:#fff; min-width:0; }
        .btn { border:0; border-radius:8px; padding:10px 18px; background:var(--primary); color:white; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:8px; justify-content:center; font-size:14px; }
        .btn.secondary { background:#e9eef3; color:var(--text); }
        .btn:hover { opacity:.9; }
        .user-badge { display:flex; align-items:center; gap:8px; background:#e9eef3; border-radius:8px; padding:8px 14px; font-weight:600; font-size:14px; color:var(--text); }
        .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; padding-bottom:48px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:18px; display:flex; flex-direction:column; gap:10px; }
        .tag { color:var(--primary); font-weight:800; font-size:12px; text-transform:uppercase; }
        @media(max-width:800px){ .grid, form { grid-template-columns:1fr; } nav { display:none; } }
    </style>
</head>
<body>
<header>
    <div class="bar">
        <a class="logo" href="/Home"><span class="material-symbols-outlined">camera</span>Athletica</a>
        <nav>
            <a href="/eventos">Eventos</a>
            <a href="/fotos">Fotos</a>
            <a th:if="${usuario != null}" href="/carrinho">Carrinho</a>
            <a th:if="${usuario != null}" href="/minhas-fotos">Minhas fotos</a>
        </nav>
        <div class="actions">
            <a th:if="${usuario == null}" class="btn secondary" href="/login">Entrar</a>
            <span th:if="${usuario != null}" class="user-badge">
                <span class="material-symbols-outlined" style="font-size:18px">person</span>
                <span th:text="'Olá, ' + ${usuario.nome}">Olá</span>
            </span>
            <button th:if="${usuario != null}" class="btn secondary" onclick="fazerLogout()">Sair</button>
        </div>
    </div>
</header>
<main>
    <h1>Eventos</h1>
    <p>Busque eventos cadastrados no backend e abra a galeria vinculada a cada um.</p>
    <form method="get" action="/eventos">
        <input name="busca" placeholder="Buscar por título, descrição ou cidade" th:value="${busca}">
        <select name="categoriaId">
            <option value="">Todas as categorias</option>
            <option th:each="categoria : ${categorias}" th:value="${categoria.id}" th:selected="${categoria.id == categoriaId}" th:text="${categoria.nome}">Categoria</option>
        </select>
        <button class="btn" type="submit"><span class="material-symbols-outlined">search</span>Filtrar</button>
    </form>
    <div class="grid">
        <article class="card" th:each="evento : ${eventos}">
            <span class="tag" th:text="${evento.categoria != null ? evento.categoria.nome : 'Evento'}">Categoria</span>
            <h2 th:text="${evento.titulo}">Evento</h2>
            <p th:text="${evento.descricao}">Descrição</p>
            <p th:text="${evento.local + ' | ' + evento.cidade + ' - ' + evento.pais}">Local</p>
            <p th:text="${#temporals.format(evento.dataEvento, 'dd/MM/yyyy HH:mm')}">Data</p>
            <a class="btn" th:href="@{/fotos(eventoId=${evento.id})}">Ver fotos</a>
        </article>
    </div>
</main>
<script>
    async function fazerLogout() {
        await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/login';
    }
</script>
</body>
</html>
