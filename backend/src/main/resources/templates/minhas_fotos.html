<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas fotos | Athletica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#005cab; --bg:#f5faff; --text:#171c20; --muted:#5c6372; --card:#fff; --border:#e2e8f0; }
        * { box-sizing:border-box; } body { margin:0; font-family:Inter,sans-serif; background:var(--bg); color:var(--text); }
        header { height:64px; background:#fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2; }
        .bar, main { max-width:1180px; margin:auto; padding:0 24px; }
        .bar { height:64px; display:flex; justify-content:space-between; align-items:center; }
        .logo { color:var(--primary); font-weight:800; font-size:22px; display:flex; gap:10px; align-items:center; }
        .actions { display:flex; gap:10px; align-items:center; }
        nav { display:flex; gap:16px; } a { color:inherit; text-decoration:none; } nav a { color:var(--muted); font-weight:600; }
        h1 { font-size:44px; margin:38px 0 24px; letter-spacing:0; }
        .pedido { background:#fff; border:1px solid var(--border); border-radius:8px; padding:18px; margin-bottom:16px; }
        .top { display:flex; justify-content:space-between; gap:16px; align-items:center; border-bottom:1px solid var(--border); padding-bottom:14px; margin-bottom:14px; }
        .total { color:var(--primary); font-size:24px; font-weight:800; }
        .item { display:flex; justify-content:space-between; padding:10px 0; color:var(--muted); }
        .empty { background:#fff; border:1px dashed var(--border); border-radius:8px; padding:28px; color:var(--muted); }
        button { border:0; border-radius:8px; padding:8px 14px; font-size:14px; font-weight:700; cursor:pointer; }
        .btn.secondary { background:#e9eef3; color:var(--text); }
        .btn:hover { opacity:.9; }
        .user-badge { display:flex; align-items:center; gap:8px; background:#e9eef3; border-radius:8px; padding:8px 14px; font-weight:600; font-size:14px; color:var(--text); }
        @media(max-width:700px){ nav { display:none; } .top { align-items:flex-start; flex-direction:column; } }
    </style>
</head>
<body>
<header>
    <div class="bar">
        <a class="logo" href="/Home"><span class="material-symbols-outlined">camera</span>Athletica</a>
        <nav><a href="/eventos">Eventos</a><a href="/fotos">Fotos</a><a href="/carrinho">Carrinho</a><a href="/minhas-fotos">Minhas fotos</a></nav>
        <div class="actions">
            <span th:if="${usuario != null}" class="user-badge">
                <span class="material-symbols-outlined" style="font-size:18px">person</span>
                <span th:text="'Olá, ' + ${usuario.nome}">Olá</span>
            </span>
            <button th:if="${usuario != null}" class="btn secondary" onclick="fazerLogout()">Sair</button>
        </div>
    </div>
</header>
<main>
    <h1>Minhas fotos</h1>
    <div class="empty" th:if="${#lists.isEmpty(pedidos)}">Você ainda não possui pedidos finalizados.</div>
    <article class="pedido" th:each="pedido : ${pedidos}">
        <div class="top">
            <div>
                <strong th:text="${'Pedido #' + pedido.id}">Pedido</strong>
                <p th:text="${#temporals.format(pedido.criadoEm, 'dd/MM/yyyy HH:mm') + ' | ' + pedido.status}">Data</p>
            </div>
            <span class="total" th:text="${'R$ ' + pedido.total}">R$ 0.00</span>
        </div>
        <div class="item" th:each="item : ${pedido.itens}">
            <span th:text="${item.nomeFoto}">Foto</span>
            <strong th:text="${'R$ ' + item.precoUnitario}">R$ 0.00</strong>
        </div>
    </article>
</main>
<script>
    async function fazerLogout() {
        await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/login';
    }
</script>
</body>
</html>
