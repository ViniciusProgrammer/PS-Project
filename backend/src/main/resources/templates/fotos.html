<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos | Athletica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#005cab; --hover:#0075d6; --bg:#f5faff; --text:#171c20; --muted:#5c6372; --card:#fff; --border:#e2e8f0; }
        * { box-sizing:border-box; } body { margin:0; font-family:Inter,sans-serif; background:var(--bg); color:var(--text); }
        header { height:64px; background:#fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2; }
        .bar, main { max-width:1180px; margin:auto; padding:0 24px; }
        .bar { height:64px; display:flex; justify-content:space-between; align-items:center; }
        .logo { color:var(--primary); font-weight:800; font-size:22px; display:flex; gap:10px; align-items:center; }
        .actions { display:flex; gap:10px; align-items:center; }
        nav { display:flex; gap:16px; } a { color:inherit; text-decoration:none; } nav a { color:var(--muted); font-weight:600; }
        h1 { font-size:44px; margin:38px 0 10px; letter-spacing:0; } p { color:var(--muted); }
        .filters { display:flex; gap:10px; flex-wrap:wrap; margin:24px 0; }
        .chip, .btn { border:1px solid var(--border); border-radius:8px; padding:10px 14px; background:#fff; font-weight:700; cursor:pointer; font-size:14px; }
        .chip.active, .btn { background:var(--primary); color:#fff; border-color:var(--primary); }
        .btn.secondary { background:#e9eef3; color:var(--text); border-color:var(--border); }
        .btn:hover { opacity:.9; }
        .user-badge { display:flex; align-items:center; gap:8px; background:#e9eef3; border-radius:8px; padding:8px 14px; font-weight:600; font-size:14px; color:var(--text); }
        .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; padding-bottom:90px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
        .card img { width:100%; height:260px; object-fit:cover; display:block; }
        .body { padding:14px; display:grid; gap:10px; }
        .price { color:var(--primary); font-weight:800; }
        .floating { position:fixed; right:24px; bottom:24px; background:var(--primary); color:white; border-radius:999px; padding:14px 18px; font-weight:800; box-shadow:0 12px 28px #0002; }
        @media(max-width:1000px){ .grid { grid-template-columns:repeat(2,1fr); } }
        @media(max-width:560px){ .grid { grid-template-columns:1fr; } nav { display:none; } }
    </style>
</head>
<body>
<header>
    <div class="bar">
        <a class="logo" href="/Home"><span class="material-symbols-outlined">camera</span>Athletica</a>
        <nav>
            <a href="/eventos">Eventos</a>
            <a href="/fotos">Fotos</a>
            <a th:if="${usuario != null}" href="/carrinho">Carrinho</a>
            <a th:if="${usuario != null}" href="/minhas-fotos">Minhas fotos</a>
        </nav>
        <div class="actions">
            <a th:if="${usuario == null}" class="btn secondary" href="/login">Entrar</a>
            <span th:if="${usuario != null}" class="user-badge">
                <span class="material-symbols-outlined" style="font-size:18px">person</span>
                <span th:text="'Olá, ' + ${usuario.nome}">Olá</span>
            </span>
            <button th:if="${usuario != null}" class="btn secondary" onclick="fazerLogout()">Sair</button>
        </div>
    </div>
</header>
<main>
    <h1 th:text="${eventoSelecionado != null ? eventoSelecionado.titulo : 'Todas as fotos'}">Fotos</h1>
    <p th:text="${fotos.size() + ' fotos disponíveis'}">0 fotos disponíveis</p>
    <div class="filters">
        <a th:class="${eventoId == null ? 'chip active' : 'chip'}" href="/fotos">Todas</a>
        <a th:each="evento : ${eventos}" th:href="@{/fotos(eventoId=${evento.id})}" th:class="${evento.id == eventoId ? 'chip active' : 'chip'}" th:text="${evento.titulo}">Evento</a>
    </div>
    <section class="grid">
        <article class="card" th:each="foto : ${fotos}">
            <img th:src="${foto.url}" th:alt="${foto.nome}">
            <div class="body">
                <strong th:text="${foto.nome}">Foto</strong>
                <span class="price" th:text="${'R$ ' + foto.preco}">R$ 0.00</span>
                <button class="btn add-cart" type="button" th:data-foto-id="${foto.id}">
                    <span class="material-symbols-outlined">add_shopping_cart</span>Adicionar
                </button>
            </div>
        </article>
    </section>
</main>
<a class="floating" href="/carrinho"><span id="cartCount">0</span> fotos no carrinho</a>
<script>
    async function atualizarContador() {
        const response = await fetch('/api/carrinho', { credentials: 'include' });
        if (!response.ok) return;
        const carrinho = await response.json();
        document.getElementById('cartCount').textContent = carrinho.itens.length;
    }

    document.querySelectorAll('.add-cart').forEach((button) => {
        button.addEventListener('click', async () => {
            const response = await fetch('/api/carrinho/' + button.dataset.fotoId, {
                method: 'POST',
                credentials: 'include'
            });

            if (response.status === 401) {
                window.location.href = '/login';
                return;
            }

            if (response.ok) {
                button.textContent = 'Adicionada';
                button.disabled = true;
                atualizarContador();
            }
        });
    });

    atualizarContador();
</script>
<script>
    async function fazerLogout() {
        await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/login';
    }
</script>
</body>
</html>
