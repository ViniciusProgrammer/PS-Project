version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ps-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Imdvini2k48@
      MYSQL_DATABASE: ps_project
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps-backend
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/ps_project?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Imdvini2k48@
      API_SECURITY_TOKEN_SECRET: MinhaChaveSecretaSuperSegura2024!
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data: