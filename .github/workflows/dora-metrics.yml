name: Métricas DORA

on: 
  workflow_dispatch:
  push: 
    branches: 
      - 'main'

jobs:
    dora:
      runs-on: windows-latest
      steps:
        - name: Test frenquecy deploy
          uses: DeveloperMetrics/deployment-frequency@main
          with:
            workflows: 'CI/CD Pipeline'
            actions-token: "${{ secrets.GITHUB_TOKEN }}"
        - name: Test lead time
          uses: DeveloperMetrics/lead-time-for-changes@main
          with:
            workflows: 'CI/CD Pipeline'
            actions-token: "${{ secrets.GITHUB_TOKEN }}"
          
        # Change Failure Rate
        - name: Change Failure Rate
          uses: DeveloperMetrics/change-failure-rate@main
          with:
            workflows: 'CI/CD Pipeline'
            actions-token: "${{ secrets.GITHUB_TOKEN }}"

        # MTTR
        - name: Mean Time To Recovery
          uses: DeveloperMetrics/mean-time-to-recovery@main
          with:
            workflows: 'CI/CD Pipeline'
            actions-token: "${{ secrets.GITHUB_TOKEN }}"
